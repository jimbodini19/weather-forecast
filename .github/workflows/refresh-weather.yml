name: refresh-weather
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    paths:
      - "build_data.py"
      - ".github/workflows/refresh-weather.yml"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build forecast data
        run: |
          mkdir -p data
          python build_data.py
      - name: Commit and push if changed
        run: |
          git config user.name "weather bot"
          git config user.email "jimmy@guidedgrowthmktg.com"
          git add data/forecast.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "data: auto-refresh $(date -u +%Y-%m-%dT%H:%MZ)"; git push; fi
